host: localhost:8080
info:
  contact: {}
  description: Admin paneli uchun CRUD endpointlari (cursor pagination, filter, sort)
  title: Usta Backend Admin API
  version: "1.0"
paths:
  /active/categories:
    get:
      description: lang berilgan tildagi nomni qaytaradi; bo'lmasa default
      parameters:
      - description: 'Til kodi (masalan: uz, ru, en)'
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Faol kategoriyalar ro'yxati (public, til bo'yicha)
      tags:
      - Categories
  /active/countries:
    get:
      description: parent_id berilmasa default 196 ishlatiladi; lang berilgan tildagi
        nomni qaytaradi, bo'lmasa default
      parameters:
      - description: 'Parent ID (default: 196)'
        in: query
        name: parent_id
        type: integer
      - description: 'Til kodi (masalan: uz, ru, en)'
        in: query
        name: lang
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Faol countries ro'yxati (public, til bo'yicha)
      tags:
      - Countries
  /active/languages:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: Faol tillar ro'yxati (public)
      tags:
      - Languages
  /auth/login:
    post:
      consumes:
      - application/json
      description: Phone+password orqali JWT token olish
      parameters:
      - description: Kirish ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user_dto.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user_dto.AuthResponse'
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties: true
            type: object
      summary: Tizimga kirish
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Yangi foydalanuvchi yaratish va JWT token qaytarish
      parameters:
      - description: Ro'yxatdan o'tish ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/user_dto.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/user_dto.AuthResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties: true
            type: object
      summary: Foydalanuvchi ro'yxatdan o'tish
      tags:
      - Auth
  /categories:
    get:
      parameters:
      - description: Keyset cursor
        in: query
        name: cursor
        type: string
      - description: Default 10, max 100
        in: query
        name: limit
        type: integer
      - description: id|name|is_active|created_at|updated_at
        in: query
        name: sort_by
        type: string
      - description: asc|desc
        in: query
        name: sort_order
        type: string
      - description: Name JSONB ichida ILIKE
        in: query
        name: name
        type: string
      - description: Holat
        in: query
        name: is_active
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Kategoriyalar ro'yxati (admin, cursor pagination)
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: 'name JSONB: har bir faol til kalitlari kiritilishi kerak'
      parameters:
      - description: Kategoriya ma'lumotlari
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/categorya_dto.CreateCategoryRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/categorya_dto.CategoryResponse'
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Kategoriya yaratish (admin, ko'p tilli)
      tags:
      - Categories
  /categories/{id}:
    delete:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Kategoriyani o'chirish (soft delete, admin)
      tags:
      - Categories
    get:
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/categorya_dto.CategoryResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Kategoriyani ID bo'yicha olish (admin)
      tags:
      - Categories
    put:
      consumes:
      - application/json
      parameters:
      - description: Category ID
        in: path
        name: id
        required: true
        type: integer
      - description: Yangilanadigan maydonlar
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/categorya_dto.UpdateCategoryRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/categorya_dto.CategoryResponse'
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
        "422":
          description: Unprocessable Entity
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Kategoriyani yangilash (admin)
      tags:
      - Categories
  /count/categories:
    get:
      parameters:
      - description: Name JSONB ichida ILIKE
        in: query
        name: name
        type: string
      - description: Holat
        in: query
